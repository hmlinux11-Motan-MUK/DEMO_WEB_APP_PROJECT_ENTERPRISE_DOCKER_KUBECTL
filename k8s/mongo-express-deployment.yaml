apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-express
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo-express
  template:
    metadata:
      labels:
        app: mongo-express
    spec:
      containers:
        - name: mongo-express
          image: mongo-express:latest
          ports:
            - containerPort: 8081
          env:
            - name: ME_CONFIG_MONGODB_URL
              value: "mongodb://HMadmin:HMpass@mongo:27017/?authSource=admin"
            - name: ME_CONFIG_BASICAUTH_USERNAME
              value: "HMadmin"
            - name: ME_CONFIG_BASICAUTH_PASSWORD
              value: "HMpass"
